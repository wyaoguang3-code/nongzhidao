<!doctype html><html lang="zh-Hant"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>459 草莓 進口</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<body style="font-family:sans-serif;background:#08122a;color:#eaf0ff;padding:20px">
<h1>459 草莓 進口</h1><p><a href="../index.html" style="color:#8bc2ff">回首頁</a></p>
<div id="panel"></div><canvas id="c"></canvas>
<script>
fetch('../data/fruit_459.json').then(r=>r.json()).then(d=>{
 const L=d.latest;
 document.getElementById('panel').innerHTML = `<p>最新均價：${L?L.price:'暫無資料'} NTD/公斤（${L?L.date:'-'}）</p>`;
 new Chart(document.getElementById('c'), {data:{labels:d.daily.map(x=>x.date),datasets:[{type:'line',label:'價格(NTD/公斤)',data:d.daily.map(x=>x.price),borderColor:'#3b82f6'},{type:'bar',label:'交易量(KG)',data:d.daily.map(x=>x.volume),backgroundColor:'rgba(16,185,129,0.35)'}]},options:{interaction:{mode:'index',intersect:false},plugins:{tooltip:{mode:'index',intersect:false}}}})
})
</script></body></html>
