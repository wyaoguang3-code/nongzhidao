<!doctype html>
<html lang="zh-Hant"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FJ3 番茄 牛蕃茄｜農知島</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang TC','Noto Sans TC',sans-serif;background:#08122a;color:#eaf0ff;margin:0}
.wrap{max-width:1200px;margin:0 auto;padding:20px}
.card{background:#0f1d3a;border:1px solid #22365f;border-radius:12px;padding:14px;margin:12px 0}
h1{margin:0 0 8px} h2{margin:0 0 10px;font-size:22px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
canvas{background:#fff;border-radius:8px;padding:6px;width:100% !important;height:320px !important;display:block}
a{color:#8bc2ff}
input,select,button,textarea{background:#0b1730;color:#eaf0ff;border:1px solid #2d4474;border-radius:8px;padding:8px}
button{cursor:pointer}
.tool-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:12px;margin-left:6px}
.badge.red{background:#7f1d1d;color:#fecaca}.badge.blue{background:#1e3a8a;color:#bfdbfe}
.result{margin-top:8px;line-height:1.6}
@media (max-width:900px){.grid,.tool-grid{grid-template-columns:1fr} canvas{height:380px !important;}}
</style></head>
<body><div class="wrap">
<h1>FJ3 番茄 牛蕃茄</h1>
<p><a href="../index.html">← 回首頁</a> ｜資料來源：<a href="https://amis.afa.gov.tw/veg/VegProdDayTransInfo.aspx">AMIS</a></p>

<div class="card" id="panel"></div>
<div class="card" id="retail"></div>
<div class="card" id="signal"></div>

<div class="card"><h2>批發市場行情趨勢圖（每週）</h2><canvas id="c_week"></canvas></div>
<div class="card"><h2>每日趨勢圖（一年以來）</h2><canvas id="c_day"></canvas></div>
<div class="grid">
  <div class="card"><h2>批發市場成交量比較（當月交易日累積）</h2><canvas id="c_vol"></canvas></div>
  <div class="card"><h2>批發市場價格比較（當月交易量加權均價；可挑價格較佳市場）</h2><canvas id="c_price"></canvas></div>
</div>
<div class="card"><h2>每月趨勢圖（5年以來）</h2><canvas id="c_month"></canvas></div>
<div class="card"><h2>每年趨勢圖（20年以來）</h2><canvas id="c_year"></canvas></div>

<div class="card" id="export_panel"></div>
<div class="card"><h2>外銷每月趨勢圖（5年以來）</h2><canvas id="ex_month"></canvas></div>
<div class="card"><h2>外銷每年趨勢圖（2016年至今）</h2><canvas id="ex_year"></canvas></div>
<div class="card"><h2>每年全台農作物災損金額（億元）</h2><canvas id="disaster_year"></canvas></div>

<div class="card">
  <h2>作物選種建議 <span class="badge red">🔴 雛形</span></h2>
  <div class="tool-grid">
    <select id="loc"><option>中部</option><option>北部</option><option>南部</option><option>東部</option></select>
    <select id="climate"><option>高溫潮濕</option><option>溫和</option><option>日夜溫差大</option></select>
    <select id="soil"><option>壤土</option><option>黏土</option><option>砂質土</option></select>
    <button onclick="runCropAdvice()">產生建議</button>
  </div>
  <div id="crop_advice" class="result">尚未計算</div>
</div>

<div class="card">
  <h2>輪作 / 間作規劃 <span class="badge red">🔴 雛形</span></h2>
  <div class="tool-grid">
    <select id="seasonCount"><option value="2">2 季</option><option value="3" selected>3 季</option><option value="4">4 季</option></select>
    <select id="goal"><option>穩定收益</option><option>土壤恢復優先</option><option>病蟲害風險降低</option></select>
    <button onclick="runRotationPlan()">生成規劃</button>
  </div>
  <div id="rotation_plan" class="result">尚未計算</div>
</div>

<div class="card">
  <h2>最佳播種時機 <span class="badge blue">🔵 雛形</span></h2>
  <div class="tool-grid">
    <input id="temp" type="number" placeholder="未來7日均溫(°C)" value="24"/>
    <input id="rain" type="number" placeholder="未來7日累積雨量(mm)" value="18"/>
    <button onclick="runSowingWindow()">推算窗口</button>
  </div>
  <div id="sowing_window" class="result">尚未計算</div>
</div>

<div class="card">
  <h2>成本試算 <span class="badge red">🔴 雛形</span></h2>
  <div class="tool-grid">
    <input id="area" type="number" placeholder="面積(分地)" value="1"/>
    <input id="seedling" type="number" placeholder="種苗單價(元/株)" value="8"/>
    <input id="fert" type="number" placeholder="肥料預算(元/分地)" value="6000"/>
    <input id="labor" type="number" placeholder="人力預算(元/分地)" value="18000"/>
    <button onclick="runCostEstimate()">計算成本</button>
  </div>
  <div id="cost_est" class="result">尚未計算</div>
</div>

<div class="card">
  <h2>土壤 / 地力分析 <span class="badge red">🔴 雛形</span></h2>
  <div class="tool-grid">
    <input id="ph" type="number" step="0.1" placeholder="pH" value="6.2"/>
    <select id="om"><option value="low">有機質偏低</option><option value="ok" selected>有機質適中</option><option value="high">有機質偏高</option></select>
    <button onclick="runSoilAnalysis()">分析</button>
  </div>
  <div id="soil_analysis" class="result">尚未計算</div>
</div>

<script>
fetch('../data/code_FJ3.json').then(r=>r.json()).then(d=>{
  window.fj3Data=d;
  Chart.defaults.responsive = true;
  Chart.defaults.maintainAspectRatio = false;
  const latest=d.latest_price;
  const latestJin = (latest && latest.price!=null) ? (latest.price/1.5).toFixed(2) : null;
  document.getElementById('panel').innerHTML=`<h2>價格面板（AMIS）</h2>
  <ul><li>最新均價：${latest?.price ?? '暫無資料'} 元/公斤${latestJin?('（'+latestJin+' 元/台斤）'):''}（${latest?.date ?? '-'}）</li>
  <li>近7日趨勢：${(d.daily.slice(-7).map(x=>`${x.date.slice(5)}:${x.price}`).join('、'))||'暫無資料'}</li>
  <li>市場比較月份：${d.market_compare.month || '-'}（量比/價比見下方圖）</li></ul>`;

  if(latest && latest.price!=null){
    const kg=Math.round(latest.price*2); const jin=Math.round((latest.price/1.5)*2);
    document.getElementById('retail').innerHTML='<h2>預估零售價（試算）</h2><ul><li>'+kg+' 元/公斤｜'+jin+' 元/台斤（口徑A: 批發×2）</li></ul>';
  } else {
    document.getElementById('retail').innerHTML=`<h2>預估零售價（試算）</h2><ul><li>暫無資料</li></ul>`;
  }

  // 近期買賣指標（試行）
  const vals = d.daily.map(x=>x.price).filter(x=>x!==null && !Number.isNaN(x));
  const q = (arr,p)=>{ if(!arr.length) return null; const s=[...arr].sort((a,b)=>a-b); const i=(s.length-1)*p; const lo=Math.floor(i), hi=Math.ceil(i); if(lo===hi) return s[lo]; return s[lo]+(s[hi]-s[lo])*(i-lo); };
  const p30=q(vals,0.3), p70=q(vals,0.7);
  const last7 = d.daily.slice(-7).map(x=>x.price).filter(x=>x!==null);
  let trend=0;
  if(last7.length>=2) trend = last7[last7.length-1]-last7[0];
  let buy='普通', sell='普通價格';
  if(latest && latest.price!=null && p30!=null && p70!=null){
    if(latest.price < p30){ buy='推薦'; sell='弱勢價格'; }
    else if(latest.price > p70){ buy='不推薦'; sell='優秀價格'; }
    if(trend>5){ if(buy==='推薦') buy='普通'; else if(buy==='普通') buy='不推薦'; if(sell==='弱勢價格') sell='普通價格'; else if(sell==='普通價格') sell='優秀價格'; }
    if(trend<-5){ if(buy==='不推薦') buy='普通'; else if(buy==='普通') buy='推薦'; if(sell==='優秀價格') sell='普通價格'; else if(sell==='普通價格') sell='弱勢價格'; }
  }
  const trendText = Number.isFinite(trend) ? ((trend>0?'+':'') + trend.toFixed(2)) : '-';
  const curText = (latest&&latest.price!=null) ? (latest.price + ' 元/公斤（' + (latest.price/1.5).toFixed(2) + ' 元/台斤）') : '-';
  const p30Text = (p30!=null) ? (p30.toFixed(2) + ' 元/公斤（' + (p30/1.5).toFixed(2) + ' 元/台斤）') : '-';
  const p70Text = (p70!=null) ? (p70.toFixed(2) + ' 元/公斤（' + (p70/1.5).toFixed(2) + ' 元/台斤）') : '-';
  document.getElementById('signal').innerHTML = '<h2>近期交易指標（試行）</h2><ul><li>購買建議：<b>'+buy+'</b></li><li>賣出建議：<b>'+sell+'</b></li><li>參考：目前價 '+curText+' / P30 '+p30Text+'（買偏賺 / 賣偏虧） / P70 '+p70Text+'（買偏虧 / 賣偏賺） / 近7日變化 '+trendText+'</li></ul>';

  const mkPriceVol = (id, labels, prices, volumes, priceLabel) => new Chart(document.getElementById(id), {
    data: {
      labels,
      datasets: [
        {type:'line', label:(priceLabel + ' (NTD/公斤)'), data:prices, borderColor:'#3b82f6', backgroundColor:'#3b82f6', yAxisID:'y'},
        {type:'bar', label:'交易量 (KG)', data:volumes, backgroundColor:'rgba(16,185,129,0.35)', yAxisID:'y1'}
      ]
    },
    options: {
      responsive:true,
      interaction: { mode:'index', intersect:false },
      plugins: {
        tooltip: {
          mode:'index',
          intersect:false,
          callbacks: {
            label: function(ctx) {
              const ds = ctx.dataset.label || '';
              const v = ctx.parsed.y;
              if (ds.includes('NTD/公斤')) return ds + ': ' + v + ' NTD/公斤';
              return ds + ': ' + v + ' KG';
            }
          }
        }
      },
      scales: {
        y: {type:'linear', position:'left', title:{display:true,text:'價格 (NTD/公斤)'}},
        y1: {type:'linear', position:'right', grid:{drawOnChartArea:false}, title:{display:true,text:'交易量 (KG)'}}
      }
    }
  });

  mkPriceVol('c_week', d.weekly.map(x=>x.key), d.weekly.map(x=>x.price), d.weekly.map(x=>x.volume), '每週均價');
  mkPriceVol('c_day', d.daily.map(x=>x.date), d.daily.map(x=>x.price), d.daily.map(x=>x.volume), '每日均價');
  mkPriceVol('c_month', d.monthly.map(x=>x.key), d.monthly.map(x=>x.price), d.monthly.map(x=>x.volume), '每月均價');
  mkPriceVol('c_year', d.yearly.map(x=>x.key), d.yearly.map(x=>x.price), d.yearly.map(x=>x.volume), '每年均價');

  new Chart(document.getElementById('c_vol'), {
    type:'bar',
    data:{labels:d.market_compare.markets_volume.map(x=>x.market), datasets:[{label:'當月累積成交量 (KG)',data:d.market_compare.markets_volume.map(x=>x.volume), backgroundColor:'#10b981'}]},
    options:{
      interaction:{mode:'index',intersect:false},
      plugins:{
        tooltip:{enabled:true,mode:'index',intersect:false,callbacks:{label:(ctx)=> (ctx.dataset.label||'') + ': ' + ctx.parsed.y + ' KG'}}
      },
      scales:{y:{title:{display:true,text:'交易量 (KG)'}}}
    }
  });
  new Chart(document.getElementById('c_price'), {
    type:'bar',
    data:{labels:d.market_compare.markets_price.map(x=>x.market), datasets:[{label:'當月加權均價 (NTD/公斤, 低到高)',data:d.market_compare.markets_price.map(x=>x.price), backgroundColor:'#f59e0b'}]},
    options:{
      interaction:{mode:'index',intersect:false},
      plugins:{
        tooltip:{enabled:true,mode:'index',intersect:false,callbacks:{label:(ctx)=> (ctx.dataset.label || '') + ': ' + ctx.parsed.y + ' NTD/公斤'}}
      },
      scales:{y:{title:{display:true,text:'價格 (NTD/公斤)'}}}
    }
  });

  fetch('../data/code_FJ3_export.json').then(r=>r.json()).then(ex=>{
    const lm = ex.latest_month || {};
    document.getElementById('export_panel').innerHTML = `<h2>外銷面板（農業部貿易統計，出口）</h2>
      <ul>
        <li>查詢條件：期間 ${ex.range || '-'}；國別代號 ${ex.country_codes || '-'}；農產品別 ${ex.product_code || '-'}</li>
        <li>最新月份：${lm.key || '-'}，出口量 ${lm.weight_ton ?? '-'} 公噸，出口值 ${(lm.value_ntd ?? 0).toLocaleString()} 元，均價 ${(lm.avg_price_ntd_per_ton ?? 0).toLocaleString()} 元/公噸</li>
        <li>資料來源：<a href="https://agrstat.moa.gov.tw/sdweb/public/trade/TradeCoa.aspx" target="_blank">農業部 貿易統計</a>（單位：值為新台幣）</li>
      </ul>`;

    const mkExport = (id, labels, prices, volumes, titleLabel) => new Chart(document.getElementById(id), {
      data: {
        labels,
        datasets: [
          {type:'line', label:(titleLabel + '均價 (NTD/公噸)'), data:prices, borderColor:'#a78bfa', backgroundColor:'#a78bfa', yAxisID:'y'},
          {type:'bar', label:'出口量 (公噸)', data:volumes, backgroundColor:'rgba(59,130,246,0.35)', yAxisID:'y1'}
        ]
      },
      options: {
        responsive:true,
        interaction:{mode:'index',intersect:false},
        plugins:{tooltip:{mode:'index',intersect:false}},
        scales:{
          y:{type:'linear',position:'left',title:{display:true,text:'均價 (NTD/公噸)'}},
          y1:{type:'linear',position:'right',grid:{drawOnChartArea:false},title:{display:true,text:'出口量 (公噸)'}}
        }
      }
    });

    mkExport('ex_month', ex.monthly5.map(x=>x.key), ex.monthly5.map(x=>x.avg_price_ntd_per_ton), ex.monthly5.map(x=>x.weight_ton), '每月');
    mkExport('ex_year', ex.yearly.map(x=>String(x.year)), ex.yearly.map(x=>x.avg_price_ntd_per_ton), ex.yearly.map(x=>x.weight_ton), '每年');
  }).catch(()=>{
    document.getElementById('export_panel').innerHTML = '<h2>外銷面板（農業部貿易統計，出口）</h2><ul><li>外銷資料暫時載入失敗。</li></ul>';
  });

  fetch('../data/tw_crop_disaster_yearly.json').then(r=>r.json()).then(ds=>{
    new Chart(document.getElementById('disaster_year'), {
      data:{
        labels: ds.yearly.map(x=>String(x.year)),
        datasets:[
          {type:'bar', label:'災損金額（億元）', data: ds.yearly.map(x=>x.loss_100m_ntd), backgroundColor:'rgba(239,68,68,0.55)', borderColor:'#ef4444', borderWidth:1, yAxisID:'y'},
          {type:'line', label:'災損數量（公噸）', data: ds.yearly.map(x=>x.loss_qty_ton), borderColor:'#22d3ee', backgroundColor:'#22d3ee', tension:0.25, yAxisID:'y1'}
        ]
      },
      options:{
        responsive:true,
        interaction:{mode:'index',intersect:false},
        plugins:{ tooltip:{ callbacks:{ label:(ctx)=> ctx.dataset.label.includes('金額') ? `${ctx.dataset.label}: ${ctx.parsed.y} 億元` : `${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString()} 公噸` } } },
        scales:{
          y:{ type:'linear', position:'left', title:{display:true,text:'金額（億元）'} },
          y1:{ type:'linear', position:'right', grid:{drawOnChartArea:false}, title:{display:true,text:'數量（公噸）'} }
        }
      }
    });
  });
})

function runCropAdvice(){
  const loc=document.getElementById('loc').value;
  const climate=document.getElementById('climate').value;
  const soil=document.getElementById('soil').value;
  const picks=[];
  if(climate==='高溫潮濕') picks.push('耐熱抗病型番茄');
  if(climate==='日夜溫差大') picks.push('高糖度鮮食型番茄');
  if(soil==='黏土') picks.push('根系較強、耐積水砧木嫁接苗');
  if(!picks.length) picks.push('標準牛番茄主力品種');
  document.getElementById('crop_advice').innerHTML=`建議地區：${loc}<br>推薦：${picks.join('、')}<br>備註：此為規則雛形，後續可接真實氣象/土壤資料。`;
}

function runRotationPlan(){
  const n=Number(document.getElementById('seasonCount').value);
  const goal=document.getElementById('goal').value;
  const base=['番茄','豆科綠肥','葉菜類','短期瓜類'];
  const seq=base.slice(0,n);
  let tip='';
  if(goal==='土壤恢復優先') tip='番茄後接豆科綠肥，提升氮循環。';
  else if(goal==='病蟲害風險降低') tip='避免連作茄科，至少間隔1季。';
  else tip='主作物與現金流作物交錯，降低波動。';
  document.getElementById('rotation_plan').innerHTML=`${n}季建議：${seq.join(' → ')}<br>${tip}`;
}

function runSowingWindow(){
  const t=Number(document.getElementById('temp').value);
  const r=Number(document.getElementById('rain').value);
  let level='可播種';
  if(t<16||t>32||r>120) level='不建議播種';
  else if((t>=16&&t<20)||(r>60)) level='條件普通，建議觀望2-3天';
  document.getElementById('sowing_window').innerHTML=`判斷：<b>${level}</b><br>依據：均溫 ${t}°C、雨量 ${r}mm（規則雛形）`;
}

function runCostEstimate(){
  const area=Number(document.getElementById('area').value)||0;
  const seed=Number(document.getElementById('seedling').value)||0;
  const fert=Number(document.getElementById('fert').value)||0;
  const labor=Number(document.getElementById('labor').value)||0;
  const seedlings=area*1800*seed;
  const total=seedlings+(fert*area)+(labor*area);
  document.getElementById('cost_est').innerHTML=`種苗：約 ${Math.round(seedlings).toLocaleString()} 元<br>肥料：約 ${Math.round(fert*area).toLocaleString()} 元<br>人力：約 ${Math.round(labor*area).toLocaleString()} 元<br><b>總成本：約 ${Math.round(total).toLocaleString()} 元</b>`;
}

function runSoilAnalysis(){
  const ph=Number(document.getElementById('ph').value);
  const om=document.getElementById('om').value;
  const msgs=[];
  if(ph<5.8) msgs.push('pH偏酸，建議施用石灰資材調整。');
  else if(ph>7.2) msgs.push('pH偏鹼，建議有機質與酸性資材微調。');
  else msgs.push('pH區間適合番茄。');
  if(om==='low') msgs.push('有機質偏低，建議補充堆肥/綠肥。');
  if(om==='high') msgs.push('有機質偏高，留意氮素過剩徒長。');
  document.getElementById('soil_analysis').innerHTML=msgs.join('<br>');
}
</script>
</div></body></html>
