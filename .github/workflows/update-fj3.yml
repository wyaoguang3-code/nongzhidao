name: Update FJ3 daily

on:
  schedule:
    - cron: '*/15 0-4 * * *' # 08:00-12:45 Asia/Taipei, every 15 min
    - cron: '0 5 * * *'      # 13:00 Asia/Taipei
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update data/code_FJ3.json
        run: |
          python - <<'PY'
          import json,re,urllib.parse,urllib.request
          from collections import defaultdict
          from datetime import datetime,timedelta,timezone
          from pathlib import Path

          TZ=timezone(timedelta(hours=8))
          def now_tpe(): return datetime.now(TZ)
          def to_roc(dt): return f"{dt.year-1911:03d}/{dt.month:02d}/{dt.day:02d}"
          def parse_roc(s): y,m,d=s.split('/'); return f"{int(y)+1911:04d}-{int(m):02d}-{int(d):02d}"

          def fetch_rows(code='FJ3', text='чХкшМД чЙЫшХГшМД', days=365*20):
              url='https://amis.afa.gov.tw/veg/VegProdDayTransInfo.aspx'
              req=urllib.request.Request(url,headers={'User-Agent':'Mozilla/5.0'})
              html=urllib.request.urlopen(req,timeout=30).read().decode('utf-8','ignore')
              def hidden(name):
                  m=re.search(rf'name="{re.escape(name)}"[^>]*value="([^"]*)"',html)
                  return m.group(1) if m else ''
              end=now_tpe(); start=end-timedelta(days=max(6,days-1))
              form={
                '__VIEWSTATE':hidden('__VIEWSTATE'),'__VIEWSTATEGENERATOR':hidden('__VIEWSTATEGENERATOR'),'__EVENTVALIDATION':hidden('__EVENTVALIDATION'),
                'ctl00$contentPlaceHolder$ucDateScope$rblDateScope':'P','ctl00$contentPlaceHolder$ucSolarLunar$radlSolarLunar':'S',
                'ctl00$contentPlaceHolder$txtSTransDate':to_roc(start),'ctl00$contentPlaceHolder$txtETransDate':to_roc(end),
                'ctl00$contentPlaceHolder$txtMarket':'хЕищГих╕Вха┤','ctl00$contentPlaceHolder$hfldMarketNo':'ALL',
                'ctl00$contentPlaceHolder$txtProduct':text,'ctl00$contentPlaceHolder$hfldProductNo':code,'ctl00$contentPlaceHolder$hfldProductType':'',
                'ctl00$contentPlaceHolder$btnQuery':'цЯешйв'
              }
              body=urllib.parse.urlencode(form).encode('utf-8')
              req2=urllib.request.Request(url,data=body,headers={'User-Agent':'Mozilla/5.0','Content-Type':'application/x-www-form-urlencoded'})
              html2=urllib.request.urlopen(req2,timeout=180).read().decode('utf-8','ignore')
              tr_pat=re.compile(r'<tr[^>]*>(.*?)</tr>',re.I|re.S)
              td_pat=re.compile(r'<t[dh][^>]*>(.*?)</t[dh]>',re.I|re.S)
              def clean(s):
                  s=re.sub(r'<[^>]+>','',s).replace('&nbsp;',' ').replace('\u3000',' ')
                  return ' '.join(s.split()).strip()
              out=[]
              for tr in tr_pat.findall(html2):
                  cols=[clean(c) for c in td_pat.findall(tr)]
                  if len(cols)<10: continue
                  if not re.fullmatch(r'\d{3}/\d{2}/\d{2}',cols[0]): continue
                  mm=re.match(r'([0-9]{3})\s+(.+)$',cols[1]); mp=re.match(r'([A-Z0-9]{2,5})\s+(.+)$',cols[2])
                  if not mm or not mp or mp.group(1)!=code: continue
                  try: price=float(cols[6].replace(',',''))
                  except: continue
                  try: vol=float(cols[8].replace(',','')) if cols[8] not in ('','-') else 0.0
                  except: vol=0.0
                  out.append({'date':parse_roc(cols[0]),'market':mm.group(2),'price':price,'volume':vol})
              return out

          def weighted(rows):
              by=defaultdict(lambda:{'pxv':0.0,'v':0.0})
              for r in rows:
                  by[r['date']]['pxv']+=r['price']*r['volume']; by[r['date']]['v']+=r['volume']
              s=[]
              for d in sorted(by):
                  v=by[d]['v']; s.append({'date':d,'price':round(by[d]['pxv']/v,2) if v>0 else None,'volume':round(v,2)})
              return s

          rows=fetch_rows(); daily=weighted(rows)
          p=Path('data/code_FJ3.json')
          data=json.loads(p.read_text(encoding='utf-8'))
          data['updated_at']=now_tpe().isoformat()
          data['latest_price']={'date':daily[-1]['date'],'price':daily[-1]['price']} if daily else None
          data['daily']=daily
          p.write_text(json.dumps(data,ensure_ascii=False,indent=2),encoding='utf-8')
          print('updated latest=',data['latest_price'])
          PY

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/code_FJ3.json
          git diff --cached --quiet || git commit -m "chore: auto-update FJ3 data"
          git push
