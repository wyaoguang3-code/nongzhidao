name: Update FJ3 daily

on:
  # 2026-05-08：schedule 停用 — 改由本地 launchd (com.openclaw.tomato.update) 觸發。
  # 原因：GitHub Actions runner IP 被 AMIS 擋 (URLError)，5/4 起資料一直 keep_old。
  # 本地走台灣家用 IP 抓得到 AMIS 5/8+ 最新資料。
  # 要恢復 GH 自動排程就把下面 cron 反註解。
  # schedule:
  #   - cron: '*/15 0-4 * * *' # 08:00-12:45 Asia/Taipei, every 15 min
  #   - cron: '0 5 * * *'      # 13:00 Asia/Taipei
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update FJ3 data (wholesale + export auto-fetch)
        run: |
          python - <<'PY'
          import json,re,urllib.parse,urllib.request,ssl,time
          from collections import defaultdict
          from datetime import datetime,timedelta,timezone
          from pathlib import Path

          TZ=timezone(timedelta(hours=8))
          def now_tpe(): return datetime.now(TZ)
          def to_roc(dt): return f"{dt.year-1911:03d}/{dt.month:02d}/{dt.day:02d}"
          def parse_roc(s): y,m,d=s.split('/'); return f"{int(y)+1911:04d}-{int(m):02d}-{int(d):02d}"

          def fetch_rows(code='FJ3', text='番茄 牛蕃茄', days=365*20):
              url='https://amis.afa.gov.tw/veg/VegProdDayTransInfo.aspx'
              headers={'User-Agent':'Mozilla/5.0'}

              def open_with_retry(req, timeout=30, data=None, retries=3):
                  # Retry with normal TLS first, then fallback to unverified TLS.
                  last_err=None
                  for i in range(retries):
                      try:
                          return urllib.request.urlopen(req, timeout=timeout)
                      except Exception as e:
                          last_err=e
                          time.sleep(1.5*(i+1))
                  ctx=ssl._create_unverified_context()
                  for i in range(2):
                      try:
                          return urllib.request.urlopen(req, timeout=timeout, context=ctx)
                      except Exception as e:
                          last_err=e
                          time.sleep(2*(i+1))
                  raise last_err

              req=urllib.request.Request(url,headers=headers)
              html=open_with_retry(req,timeout=30).read().decode('utf-8','ignore')

              def hidden(name):
                  m=re.search(rf'name="{re.escape(name)}"[^>]*value="([^"]*)"',html)
                  return m.group(1) if m else ''

              end=now_tpe(); start=end-timedelta(days=max(6,days-1))
              form={
                '__VIEWSTATE':hidden('__VIEWSTATE'),'__VIEWSTATEGENERATOR':hidden('__VIEWSTATEGENERATOR'),'__EVENTVALIDATION':hidden('__EVENTVALIDATION'),
                'ctl00$contentPlaceHolder$ucDateScope$rblDateScope':'P','ctl00$contentPlaceHolder$ucSolarLunar$radlSolarLunar':'S',
                'ctl00$contentPlaceHolder$txtSTransDate':to_roc(start),'ctl00$contentPlaceHolder$txtETransDate':to_roc(end),
                'ctl00$contentPlaceHolder$txtMarket':'全部市場','ctl00$contentPlaceHolder$hfldMarketNo':'ALL',
                'ctl00$contentPlaceHolder$txtProduct':text,'ctl00$contentPlaceHolder$hfldProductNo':code,'ctl00$contentPlaceHolder$hfldProductType':'',
                'ctl00$contentPlaceHolder$btnQuery':'查詢'
              }
              body=urllib.parse.urlencode(form).encode('utf-8')
              req2=urllib.request.Request(url,data=body,headers={**headers,'Content-Type':'application/x-www-form-urlencoded'})
              html2=open_with_retry(req2,timeout=180).read().decode('utf-8','ignore')

              tr_pat=re.compile(r'<tr[^>]*>(.*?)</tr>',re.I|re.S)
              td_pat=re.compile(r'<t[dh][^>]*>(.*?)</t[dh]>',re.I|re.S)
              def clean(s):
                  s=re.sub(r'<[^>]+>','',s).replace('&nbsp;',' ').replace('\u3000',' ')
                  return ' '.join(s.split()).strip()
              out=[]
              for tr in tr_pat.findall(html2):
                  cols=[clean(c) for c in td_pat.findall(tr)]
                  if len(cols)<10: continue
                  if not re.fullmatch(r'\d{3}/\d{2}/\d{2}',cols[0]): continue
                  mm=re.match(r'([0-9]{3})\s+(.+)$',cols[1]); mp=re.match(r'([A-Z0-9]{2,5})\s+(.+)$',cols[2])
                  if not mm or not mp or mp.group(1)!=code: continue
                  try: price=float(cols[6].replace(',',''))
                  except: continue
                  try: vol=float(cols[8].replace(',','')) if cols[8] not in ('','-') else 0.0
                  except: vol=0.0
                  out.append({'date':parse_roc(cols[0]),'market':mm.group(2),'price':price,'volume':vol})
              return out

          def weighted(rows):
              by=defaultdict(lambda:{'pxv':0.0,'v':0.0})
              for r in rows:
                  by[r['date']]['pxv']+=r['price']*r['volume']; by[r['date']]['v']+=r['volume']
              s=[]
              for d in sorted(by):
                  v=by[d]['v']; s.append({'date':d,'price':round(by[d]['pxv']/v,2) if v>0 else None,'volume':round(v,2)})
              return s

          p=Path('data/code_FJ3.json')
          data=json.loads(p.read_text(encoding='utf-8'))
          try:
              rows=fetch_rows(); daily=weighted(rows)
              if daily:
                  data['updated_at']=now_tpe().isoformat()
                  data['latest_price']={'date':daily[-1]['date'],'price':daily[-1]['price']}
                  data['daily']=daily
                  p.write_text(json.dumps(data,ensure_ascii=False,indent=2),encoding='utf-8')
                  wholesale_msg='ok'
              else:
                  wholesale_msg='empty_keep_old'
          except Exception as e:
              wholesale_msg=f'exception_keep_old: {type(e).__name__}'

          # Export auto-fetch (best-effort). If fetch/parse fails, keep old file unchanged.
          ep=Path('data/code_FJ3_export.json')
          ex_old = json.loads(ep.read_text(encoding='utf-8')) if ep.exists() else {}
          ex_new = dict(ex_old)
          export_ok = False
          export_msg = 'not_attempted'
          try:
              # Source endpoint occasionally has TLS chain issues; use unverified context in CI.
              ctx = ssl._create_unverified_context()
              src = 'https://agrstat.moa.gov.tw/OpenData/TradeByMonth.ashx?format=json'
              req = urllib.request.Request(src, headers={'User-Agent':'Mozilla/5.0'})
              raw = urllib.request.urlopen(req, timeout=40, context=ctx).read().decode('utf-8','ignore')
              arr = json.loads(raw)

              # Flexible key mapping for unknown schema variants
              def g(o, keys):
                  for k in keys:
                      if k in o and o[k] not in (None, ''):
                          return o[k]
                  return None

              rows = []
              for r in (arr if isinstance(arr, list) else []):
                  code = str(g(r, ['prod_code','product_code','品別代號','產品代號']) or '')
                  name = str(g(r, ['prod_name','product_name','品名','產品名稱']) or '')
                  if not (('FJ3' in code) or ('番茄' in name)):
                      continue
                  ym = str(g(r, ['ym','year_month','月份','年月']) or '')
                  wt = float(g(r, ['weight_ton','重量公噸','數量']) or 0)
                  val = float(g(r, ['value_ntd','價值新台幣','價值']) or 0)
                  if not ym:
                      continue
                  avg = round(val / wt, 2) if wt > 0 else 0
                  rows.append({'key': ym, 'weight_ton': wt, 'value_ntd': int(val), 'avg_price_ntd_per_ton': avg})

              rows.sort(key=lambda x: x['key'])
              monthly5 = rows[-60:]
              by_year = {}
              for r in rows:
                  y = str(r['key'])[:4]
                  by_year.setdefault(y, {'w':0.0, 'v':0.0})
                  by_year[y]['w'] += r['weight_ton']
                  by_year[y]['v'] += r['value_ntd']
              yearly = []
              for y in sorted(by_year):
                  w = by_year[y]['w']; v = by_year[y]['v']
                  yearly.append({'year': int(y), 'weight_ton': round(w,2), 'value_ntd': int(v), 'avg_price_ntd_per_ton': round(v/w,2) if w>0 else 0})

              if monthly5 and yearly:
                  ex_new.update({
                      'code':'FJ3','name':'番茄 牛蕃茄','type':'export','currency':'NTD','unit_weight':'ton','unit_value':'NTD',
                      'source':'https://agrstat.moa.gov.tw','updated_at': now_tpe().isoformat(),
                      'latest_month': monthly5[-1], 'monthly5': monthly5, 'yearly': yearly
                  })
                  ep.write_text(json.dumps(ex_new, ensure_ascii=False, indent=2), encoding='utf-8')
                  export_ok = True
                  export_msg = f"ok rows={len(monthly5)} latest={monthly5[-1].get('key','-')}"
              else:
                  export_msg = 'empty_result_keep_old'
          except Exception as e:
              export_msg = f"exception_keep_old: {type(e).__name__}"

          # write status for next step notification
          Path('data/fj3_update_status.json').write_text(json.dumps({
              'wholesale_latest': data.get('latest_price'),
              'wholesale_msg': wholesale_msg,
              'export_ok': export_ok,
              'export_msg': export_msg,
              'ts': now_tpe().isoformat()
          }, ensure_ascii=False, indent=2), encoding='utf-8')

          print('updated wholesale latest=',data.get('latest_price'))
          print('wholesale status=',wholesale_msg)
          print('export status=',export_msg)
          PY

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/code_FJ3.json data/code_FJ3_export.json data/fj3_update_status.json
          git diff --cached --quiet || git commit -m "chore: auto-update FJ3 data"
          git push

      - name: Notify export fetch status in run summary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p=Path('data/fj3_update_status.json')
          d=json.loads(p.read_text(encoding='utf-8')) if p.exists() else {}
          txt = []
          txt.append('## FJ3 Auto Update Status')
          txt.append(f"- wholesale_latest: {d.get('wholesale_latest')}")
          txt.append(f"- export_ok: {d.get('export_ok')}")
          txt.append(f"- export_msg: {d.get('export_msg')}")
          txt.append(f"- ts: {d.get('ts')}")
          summary='\n'.join(txt)+'\n'
          Path('/tmp/fj3_summary.md').write_text(summary, encoding='utf-8')
          print(summary)
          PY
          cat /tmp/fj3_summary.md >> "$GITHUB_STEP_SUMMARY"
